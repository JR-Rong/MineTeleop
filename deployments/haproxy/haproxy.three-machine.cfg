global
	log /dev/log local0
	log /dev/log local1 notice
	chroot /var/lib/haproxy
	stats socket /run/haproxy/admin.sock mode 660 level admin
	stats timeout 30s
	user haproxy
	group haproxy
	daemon

defaults
	log global
	mode tcp
	option tcplog
	timeout connect 5s
	timeout client 2h
	timeout server 2h

frontend mine_teleop_port_443
	bind :443
	tcp-request inspect-delay 5s
	acl request_started req.len gt 0
	acl tls_record req.payload(0,1) -m bin 16
	tcp-request content accept if request_started
	use_backend mine_teleop_caddy_443 if tls_record
	default_backend mine_teleop_turn_tcp

frontend mine_teleop_port_6000
	bind :6000
	tcp-request inspect-delay 5s
	acl request_started req.len gt 0
	acl tls_record req.payload(0,1) -m bin 16
	tcp-request content accept if request_started
	use_backend mine_teleop_caddy if tls_record
	default_backend mine_teleop_turn_tcp

backend mine_teleop_caddy
	server caddy 127.0.0.1:16000 check

backend mine_teleop_caddy_443
	server caddy 127.0.0.1:14443 check

backend mine_teleop_turn_tcp
	server coturn 172.24.29.133:3479 check send-proxy-v2
