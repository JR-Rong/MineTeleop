services:
  vehicle-agent:
    build:
      context: ../..
      dockerfile: deployments/container/Dockerfile.media
    working_dir: /opt/mine-teleop
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    command:
      - vehicle-agent
      - --config
      - /etc/mine-teleop/vehicle-agent.yaml
      - --teleop
      - --service
    environment:
      MINE_TELEOP_DEVICE_TOKEN: ${MINE_TELEOP_DEVICE_TOKEN:-dev-device-secret}
    volumes:
      - /etc/mine-teleop:/etc/mine-teleop:ro
      - mine-teleop-recordings:/var/lib/mine-teleop/recordings
    cpus: "1.0"
    cpu_shares: 1024
    mem_limit: "1g"
    restart: on-failure

  vehicle-media-agent:
    build:
      context: ../..
      dockerfile: deployments/container/Dockerfile.media
    working_dir: /opt/mine-teleop
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - vehicle-media-agent
      - --config
      - /etc/mine-teleop/vehicle-agent.yaml
      - --driver-console-url
      - ${MINE_TELEOP_DRIVER_CONSOLE_URL:-http://host.docker.internal:8080}
      - --service
      - --record
      - --recording-root
      - /var/lib/mine-teleop/recordings
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card1:/dev/dri/card1
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
    volumes:
      - /etc/mine-teleop:/etc/mine-teleop:ro
      - mine-teleop-recordings:/var/lib/mine-teleop/recordings
    cpus: "2.0"
    cpu_shares: 2048
    mem_limit: "2g"
    restart: on-failure

  vehicle-uploader:
    build:
      context: ../..
      dockerfile: deployments/container/Dockerfile.media
    working_dir: /opt/mine-teleop
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    command:
      - vehicle-uploader
      - --service
      - --config
      - /etc/mine-teleop/vehicle-agent.yaml
      - --recording-root
      - /var/lib/mine-teleop/recordings
      - --archive-root
      - /var/lib/mine-teleop/uploader/archive
    volumes:
      - /etc/mine-teleop:/etc/mine-teleop:ro
      - mine-teleop-recordings:/var/lib/mine-teleop/recordings
      - mine-teleop-uploader:/var/lib/mine-teleop/uploader
    cpus: "1.0"
    cpu_shares: 256
    mem_limit: "1g"
    restart: on-failure

  turn-server:
    image: coturn/coturn:4.6.2
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    command:
      - turnserver
      - -c
      - /etc/mine-teleop/turnserver.conf
      - --no-cli
    ports:
      - "3478:3478/udp"
      - "5349:5349/udp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ../turnserver/turnserver.conf.template:/etc/mine-teleop/turnserver.conf:ro
      - ../tls:/etc/mine-teleop/tls:ro
    cpus: "1.0"
    mem_limit: "512m"
    restart: on-failure

volumes:
  mine-teleop-recordings:
  mine-teleop-uploader:
