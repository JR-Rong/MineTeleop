auth:
  # Browser switch acceptance: driver 001 may switch after driver 002 safely
  # releases vehicle 002. The strict isolation fixture remains the 2x2 default.
  drivers:
    - id: driver-console-001
      password_env: MINE_TELEOP_DRIVER_001_PASSWORD
      vehicles:
        - vehicle-001
        - vehicle-002
    - id: driver-console-002
      password_env: MINE_TELEOP_DRIVER_002_PASSWORD
      vehicles:
        - vehicle-002
  vehicles:
    - id: vehicle-001
      device_token_env: MINE_TELEOP_VEHICLE_001_TOKEN
    - id: vehicle-002
      device_token_env: MINE_TELEOP_VEHICLE_002_TOKEN
