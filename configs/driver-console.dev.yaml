driver:
  id: driver-console-001

cloud:
  auth_url: http://127.0.0.1:8765/auth
  signaling_url: ws://127.0.0.1:8765/signaling

ui:
  default_layout: grid_4
  show_debug_overlay: true

control:
  rate_hz: 20
  estop_hold_ms: 500
  keyboard:
    steering_left: A
    steering_right: D
    throttle: W
    brake: S
    estop: E
  gamepad:
    enabled: true
    steering_axis: 0
    throttle_axis: 2
    brake_axis: 5
    axis_deadzone: 0.05
    throttle_inverted: true
    brake_inverted: true
    estop_button: 0
